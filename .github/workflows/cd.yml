name: Frontend CD

on:
  workflow_run:
    workflows: ["Frontend CI"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # PASO 1: Crear Dockerrun.aws.json
      # Le dice a Elastic Beanstalk qué imagen Docker usar
      # ─────────────────────────────────────────
      - name: Prepare Docker deployment package
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          IMAGE="ghcr.io/${{ github.repository_owner }}/modulo3-frontend:sha-${SHORT_SHA}"
          echo "Deploying image: $IMAGE"

          cat > Dockerrun.aws.json << EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "${IMAGE}",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": "8080",
                "HostPort": "80"
              }
            ]
          }
          EOF

          cat Dockerrun.aws.json
          zip deploy.zip Dockerrun.aws.json

      # ─────────────────────────────────────────
      # PASO 2: Subir a Elastic Beanstalk
      # EB descargará la imagen de ghcr.io y la correrá
      # ─────────────────────────────────────────
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APPLICATION_NAME }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME }}
          version_label: docker-${{ github.event.workflow_run.head_sha }}-${{ github.run_number }}
          region: ${{ secrets.AWS_REGION }}
          deployment_package: deploy.zip
          use_existing_version_if_available: true

      # ─────────────────────────────────────────
      # PASO 3: Smoke Test
      # ─────────────────────────────────────────
      - name: Smoke test deployed environment
        run: |
          URL="http://${{ secrets.EB_APP_URL }}"
          echo "Waiting for the environment to respond at $URL ..."
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Smoke test passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: got HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Smoke test failed: environment did not return HTTP 200"
          exit 1

      - name: Deployment successful
        run: |
          echo "✅ Frontend deployed via Docker image!"
          echo "Image: ghcr.io/${{ github.repository_owner }}/modulo3-frontend:latest"
          echo "URL: http://${{ secrets.EB_APP_URL }}"
