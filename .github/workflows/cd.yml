name: Frontend CD

on:
  workflow_run:
    workflows: ["Frontend CI"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download build artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .output
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare deployment package
        run: |
          # Create deployment directory
          mkdir -p deploy

          # Copy server build output
          cp -r .output/server deploy/
          cp -r .output/public deploy/

          # Copy Elastic Beanstalk environment configuration
          cp -r .ebextensions deploy/

          # Create production package.json
          cat > deploy/package.json << EOF
          {
            "name": "phoenix-orders-frontend",
            "version": "1.0.0",
            "type": "module",
            "scripts": {
              "start": "NITRO_PORT=8080 NITRO_HOST=127.0.0.1 node server/index.mjs"
            },
            "engines": {
              "node": "20.x"
            }
          }
          EOF

          # Create Procfile for Elastic Beanstalk
          echo "web: npm start" > deploy/Procfile

          # List deployment contents
          echo "=== Deployment package contents ==="
          ls -la deploy/

      - name: Generate deployment package
        run: |
          cd deploy
          zip -r ../deploy.zip .
          cd ..
          ls -lh deploy.zip

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APPLICATION_NAME }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME }}
          version_label: ${{ github.sha }}-${{ github.run_number }}
          region: ${{ secrets.AWS_REGION }}
          deployment_package: deploy.zip
          use_existing_version_if_available: true

      - name: Smoke test deployed environment
        run: |
          URL="http://Phoenixorders-dev.us-east-1.elasticbeanstalk.com"
          echo "Waiting for the environment to respond at $URL ..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Smoke test passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: got HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Smoke test failed: environment did not return HTTP 200"
          exit 1

      - name: Deployment successful
        run: |
          echo "✅ Frontend deployed successfully to Elastic Beanstalk!"
          echo "URL: http://Phoenixorders-dev.us-east-1.elasticbeanstalk.com"
