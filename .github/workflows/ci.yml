name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout source code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. Display Node.js and npm versions
        run: |
          node --version
          npm --version

      - name: 4. Install project dependencies
        run: npm ci

      - name: 5. Run code linting
        run: npm run lint

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: 1. Checkout source code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. Install project dependencies
        run: npm ci

      - name: 4. Build project for production
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: 5. Verify build output
        run: |
          echo "Checking build output..."
          ls -lah .output/
          echo "Server files:"
          ls -lah .output/server/
          echo "Public files:"
          ls -lah .output/public/

      - name: 6. Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .output/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  # ═══════════════════════════════════════════
  # JOB 3: docker
  # Construye la imagen y la sube a ghcr.io
  # ═══════════════════════════════════════════
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Checkout source code
        uses: actions/checkout@v4

      - name: 2. Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. Extraer metadata (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/modulo3-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: 4. Construir y publicar imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
